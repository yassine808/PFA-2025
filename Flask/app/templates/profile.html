<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Profil - MarHist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .profile-container {
            max-width: 400px; margin: 60px auto 0 auto; background: rgba(255,255,255,0.16);
            padding: 36px 38px 28px 38px; border-radius: 20px; box-shadow: 0 8px 40px rgba(31,38,135,0.12);
            text-align: center;
        }
        .profile-icon {
            width: 94px; height: 94px;
            border-radius: 50%; background: #ff9800;
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 3.4rem; font-weight: bold; margin: 0 auto 17px auto;
            box-shadow: 0 2px 10px rgba(30,30,30,0.13);
        }
        .profile-form input, .profile-form select {
            margin: 8px 0; padding: 12px; border-radius: 8px; border: 1.2px solid #eee;
            font-size: 1.06rem; width: 92%; outline: none;
        }
        .profile-form .btn { margin-top: 16px; width: 80%; }
        .flash.success { color: #44bb44; font-weight: bold; }
        .flash.danger { color: #c30; font-weight: bold; }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='logo.png') }}" alt="MarHist" class="logo">
    <div class="profile-container">
        <h2>Mon Profil</h2>
        <div class="profile-icon">{{ user.name[0]|upper }}</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{category}}">{{msg}}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form class="profile-form" method="POST">
            <input type="text" name="name" placeholder="Nom complet" value="{{ user.name }}">
            <input type="text" name="username" placeholder="Nom d'utilisateur" value="{{ user.username }}">
            <select name="gender" required>
                <option value="Homme" {% if user.gender=="Homme" %}selected{% endif %}>Homme</option>
                <option value="Femme" {% if user.gender=="Femme" %}selected{% endif %}>Femme</option>
            </select>
            <button class="btn orange" type="submit">Enregistrer</button>
        </form>
        <a href="{{ url_for('main.homepage') }}" style="color:#ff9800;font-weight:bold;display:block;margin-top:16px;">&#8592; Retour</a>
    </div>
</body>
</html>
